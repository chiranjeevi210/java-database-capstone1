<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Management System - Welcome</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="./assets/images/favicon.ico">
    <!-- CSS Links -->
    <link rel="stylesheet" href="./assets/css/index.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <!-- JS Utility Links -->
    <script src="./js/util.js" defer></script>
    <script src="./js/render.js" defer></script>
    <!-- JS Components Links -->
    <script src="./js/components/header.js" defer></script>
    <script src="./js/components/footer.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="wrapper">
            <!-- Header Placeholder -->
            <div id="header"></div>

            <!-- Main Content Area -->
            <main class="main-content">
                <h2>Select Your Role</h2>
                <div class="role-selection-group">
                    <button id="adminRoleBtn" class="dashboard-btn" onclick="selectRole('Admin')">Admin</button>
                    <button id="doctorRoleBtn" class="dashboard-btn" onclick="selectRole('Doctor')">Doctor</button>
                    <button id="patientRoleBtn" class="dashboard-btn" onclick="selectRole('Patient')">Patient</button>
                </div>
            </main>

            <!-- Footer Placeholder -->
            <div id="footer"></div>
        </div>
    </div>

    <!-- Hidden Modal Layout -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span id="closeModal" class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Service Module Script -->
    <script type="module" src="../js/services/index.js" defer></script>
</body>
</html>
