<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <!-- Thymeleaf CSS Engine Links -->
    <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <!-- JavaScript Engines with defer -->
    <script th:src="@{/js/render.js}" defer></script>
    <script th:src="@{/js/util.js}" defer></script>
    <!-- Layout Components -->
    <script th:src="@{/js/components/header.js}" defer></script>
    <script th:src="@{/js/components/footer.js}" defer></script>
</head>
<body>
    <div class="container">
        <div class="wrapper">
            <!-- Dynamic Header Component Engine -->
            <div id="header"></div>

            <!-- Dashboard Control Panel Engine -->
            <main class="main-content">
                <div class="control-panel">
                    <input type="text" id="searchBar" placeholder="search by doctor name" />
                    
                    <div class="filter-section">
                        <select id="timeFilter" class="select-dropdown">
                            <option value="">Sort by time</option>
                            <option value="morning">Morning Slots</option>
                            <option value="afternoon">Afternoon Slots</option>
                        </select>
                        
                        <select id="specialtyFilter" class="select-dropdown">
                            <option value="">Filter by specialty</option>
                            <option value="Cardiologist">Cardiologist</option>
                            <option value="Neurologist">Neurologist</option>
                            <option value="Orthopedist">Orthopedist</option>
                            <option value="Pediatrician">Pediatrician</option>
                            <option value="Dermatologist">Dermatologist</option>
                        </select>
                    </div>
                </div>

                <!-- Dynamic Component Mount Context -->
                <div id="content" class="doctor-cards-container"></div>
            </main>

            <!-- Dynamic Footer Component Engine -->
            <div id="footer"></div>
        </div>
    </div>

    <!-- Interactive Creation Workspace (Hidden) -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span id="closeModal" class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Active Management Runtime Layer Services -->
    <script type="module" src="../js/services/adminDashboard.js" defer></script>
    <script type="module" src="../js/components/doctorCard.js" defer></script>
</body>
</html>
